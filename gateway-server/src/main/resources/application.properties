server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      routes:
        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/accounts/**

        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/transactions/**

        - id: risk-analysis-service
          uri: lb://risk-analysis-service
          predicates:
            - Path=/risk-analysis/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
