server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      # Habilita a descoberta automática baseada no Eureka
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      
      # Definição explícita das rotas 
      routes:
        - id: account-service
          uri: lb://account-service  # "lb://" ativa o Load Balancer via Eureka
          predicates:
            - Path=/accounts/**
            
        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/transactions/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true