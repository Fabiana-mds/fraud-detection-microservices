server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
          routes:
            - id: account-service
              uri: lb://account-service
              predicates:
                - Path=/accounts/**

            - id: transaction-service
              uri: lb://transaction-service
              predicates:
                - Path=/transactions/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/